meta:
  application: DGmini
  version: 0.1
  description: Input configuration file

mesh:
  x_left: 0.0
  x_right: 1.0
  n_elements: 200

fem:
  order: 1

pde:
  type: linear_advection
  advection_speed: 1.0

flux:
  type: lax_friedrichs
  alpha: 1.0

time_integrator:
  type: forward_euler

time_step_controller:
  type: cfl
  cfl: 0.05

run:
  final_time: 1.0

initial_condition:
  expression: "exp(-100*(x-0.5)^2)"

output:
  directory: output/regression_advection_gauss_forwardeuler
  prefix: solution
  output_dt: 0.01 #2.0 # no output
  write_initial: false
  write_final: true