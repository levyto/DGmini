meta:
  application: DGmini
  version: 0.1
  description: Input configuration file

boundary_conditions:
  left:
    type: dirichlet
    expression: "cos(2*pi*t)"
  right:
    type: outflow

mesh:
  x_left: 0.0
  x_right: 1.0
  n_elements: 20

fem:
  order: 5

pde:
  type: linear_advection
  advection_speed: 1.0

flux:
  type: rusanov
  alpha: 1.0

time_integrator:
  type: rk3_ssp

time_step_controller:
  type: fixed
  dt: 0.0025

run:
  final_time: 1.5

initial_condition:
  expression: "1"

output:
  directory: output/regression_advection_sin_rk3ssp
  prefix: solution
  output_dt: 2.0 # no output
  write_initial: false 
  write_final: true