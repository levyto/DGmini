meta:
  application: DGmini
  version: 0.1
  description: Input configuration file

boundary_conditions:
  left:
    type: dirichlet
    expression: "sin(2*pi*t+pi/2)"
    # expression: "0.5 + 0.5*sin(2*pi*t-pi/2)"
  right:
    type: outflow
    expression: "-"

mesh:
  x_left: 0.0
  x_right: 1.0
  n_elements: 20

fem:
  order: 2

pde:
  type: linear_advection
  advection_speed: 1.0

flux:
  type: rusanov
  alpha: 1.0

time_integrator:
  type: rk3_ssp

time_step_controller:
  type: cfl
  cfl: 0.35
  dt: 0.001   # ignored if type = cfl

run:
  final_time: 1.0

initial_condition:
  # expression: "sin(2*pi*x)"
  # expression: "exp(-100*(x-0.5)^2)"
  expression: "1.0"

output:
  directory: output
  prefix: solution
  output_dt: 0.01
  write_initial: true
  write_final: true