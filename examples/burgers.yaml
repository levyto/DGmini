meta:
  application: DGmini
  version: 0.1
  description: Input configuration file

boundary_conditions:
  left:
    type: periodic
  right:
    type: periodic

mesh:
  x_left: 0.0
  x_right: 1.0
  n_elements: 100

fem:
  order: 3

pde:
  type: burgers

flux:
  type: rusanov

time_integrator:
  type: rk3_ssp

time_step_controller:
  type: cfl
  cfl: 0.4

run:
  final_time: 1.00 # Time when shock forms for u_0(x) = sin(2*pi*x):
                   # is t = - 1/min(u'_0(x)) = 1/(2*pi) ~ 0.159

initial_condition:
  # expression: "sin(2*pi*x)"
  expression: "exp(-100*(x-0.5)^2)"

output:
  directory: output/burgers
  prefix: solution
  output_dt: 0.01
  write_initial: false
  write_final: true