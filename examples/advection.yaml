meta:
  application: DGmini
  version: 0.1
  description: Input configuration file

mesh:
  x_left: 0.0
  x_right: 1.0
  n_elements: 20

fem:
  order: 4

pde:
  type: linear_advection
  advection_speed: 1.0

flux:
  type: rusanov
  alpha: 1.0

time_integrator:
  type: rk3_ssp

time_step_controller:
  type: cfl
  cfl: 0.4

run:
  final_time: 1.0

initial_condition:
  expression: "sin(2*pi*x)"

output:
  directory: output/advection
  prefix: solution
  output_dt: 1.0
  write_initial: false
  write_final: true